name: 🚀 Ecommerce CI/CD
on: 
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 18
    - run: npm ci
    - run: npm test
    - run: docker build -t ecommerce .
    - run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
    - run: |
        docker tag ecommerce aryanpatel1066/ecommerce:${{ github.sha }}
        docker push aryanpatel1066/ecommerce:${{ github.sha }}
